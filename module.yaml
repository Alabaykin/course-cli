name: course-cli
title: CLI-инструмент для структурирования курса
type: teacher-side
status: MVP

problem: Преподаватели создают курсы без стандартизированной структуры и метаданных, часто забывая результаты обучения и связи с компетенциями.
hypothesis: Если при создании курса автоматически задавать шаблон структуры и напоминать о метаданных, преподаватели будут формировать более последовательные и поддерживаемые курсы.

primary_user: Преподаватель (автор курса)

inputs:
  - название курса
  - список учебных результатов (learning outcomes)
  - метаданные курса (описание, связанные навыки/компетенции)

outputs:
  - папка с файлами курса (структура каталогов, course.yaml)
  - отчёт о валидации курса (вывод CLI)
  - xAPI-события (записи о создании/валидации курса)

primary_interface: CLI (командная строка)
optional_interfaces:
  - REST API (для будущей интеграции с LMS)
  - Git hook (автоматический запуск validate при коммите)

integrations:
  - Skill-matrix (матрица навыков, обмен CASE)
  - Evidence Locker (LRS-хранилище, отправка xAPI)
  - Open edX (REST API для импорта/экспорта курса)

mvp_scope: Генерация структуры курса и базовая проверка (команды init/validate/report, шаблон course.yaml).

field_trial: Пилот с группой преподавателей, создающих реальные курсы с помощью CLI; сбор использования и отзывов.

success_metrics:
  - более 80% курсов имеют полные метаданные и результаты обучения
  - 50% курсов создаются с помощью CLI
  - положительные отзывы преподавателей об удобстве инструмента

risks:
  - низкая адаптация преподавателей (смягчение: обучение и поддержка)
  - неполные/ошибочные входные данные (смягчение: ручная проверка и отчёты)